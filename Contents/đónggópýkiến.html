<h2>Đóng góp ý kiến</h2>

<form action="#" method="post">
    <!-- Họ tên -->
    <label for="hoten">Họ và tên:</label><br>
    <input type="text" id="hoten" name="hoten" required><br><br>

    <!-- Email -->
    <label for="email">Email:</label><br>
    <input type="email" id="email" name="email"><br><br>

    <!-- Nội dung góp ý -->
    <label for="ykien">Ý kiến đóng góp:</label><br>
    <textarea id="ykien" name="ykien" rows="5" cols="40" 
              placeholder="Nhập ý kiến của bạn tại đây..." required></textarea><br><br>

    <!-- Nút -->
    <input type="submit" value="Gửi ý kiến">
    <input type="reset" value="Nhập lại">
</form>
